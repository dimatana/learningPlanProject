
services:
  db:
    image: postgres:16
    container_name: db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  adminer:
    image: adminer:latest
    container_name: adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  redpanda:
    image: redpandadata/redpanda:latest
    container_name: redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --smp 1
      - --memory 1G
      - --mode dev-container
      - --overprovisioned
    ports:
      - "19092:19092"   # Kafka API (extern)
      - "18082:18082"   # Pandaproxy (REST -> Kafka)
      - "9644:9644"     # Admin API (folosit de healthcheck)
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redpanda-console:
    image: redpandadata/console:latest
    container_name: redpanda-console
    restart: unless-stopped
    ports:
      - "8081:8080"     # UI: http://localhost:8081
    environment:
      - KAFKA_BROKERS=redpanda:9092
    depends_on:
      redpanda:
        condition: service_healthy

  bet_api:
    build:
      context: .
      dockerfile: bet_api/Dockerfile
    container_name: bet_api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/betdb
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
      - BIND_ADDR=0.0.0.0:3000
    depends_on:
      db:
        condition: service_healthy
      redpanda:
        condition: service_healthy

  trading_service:
    build:
      context: .
      dockerfile: trading-service/Dockerfile
    container_name: trading_service
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/tradingdb
      - KAFKA_BROKERS=redpanda:9092
      - BIND_ADDR=0.0.0.0:3001
    depends_on:
      db:
        condition: service_healthy
      redpanda:
        condition: service_healthy

volumes:
  pg-data:
  redpanda-data: